services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: GameSurge
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d GameSurge" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  backend:
    image: ${DOCKERHUB_USERNAME}/gamesurge-backend:latest
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/GameSurge
      - MIN_GAMES=500
      - CACHE_TTL_MINUTES=30
      - CORS_ALLOWED_ORIGINS=*
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://frontend:80/auth/callback}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME}/gamesurge-frontend:latest
    environment:
      - VITE_API_BASE_URL=http://backend:8080
      - VITE_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - VITE_DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://frontend:80/auth/callback}
    depends_on:
      - backend
